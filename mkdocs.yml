# Theme Configuration (Material主题配置)
theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight
    - toc.integrate
    - content.action.edit
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github

# 加载 Material Icons 无需外部 CDN（适配内置图标方案）
extra_css: []

# Repository Configuration
repo_name: thinkingreedjl/mypathtotw
repo_url: https://github.com/thinkingreedjl/mypathtotw/
edit_uri: edit/main/docs/

# Plugins
plugins:
  - search:
      lang: en
  - minify:
      minify_html: true

# Extra Configuration
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/thinkingreedjl
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/jeremy-l-65042890

# Markdown Extensions（核心修复：更新 emoji 引用路径）
markdown_extensions:
  - admonition
  - pymdownx.highlight:
      guess_lang: false
      use_pygments: true
      pygments_style: monokai
  - pymdownx.superfences
  - toc:
      permalink: true
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - pymdownx.emoji:  # 修复弃用警告的核心配置
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg