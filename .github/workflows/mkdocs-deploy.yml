# MkDocs 自动部署（适配 1.x 版本，解决 2.0 兼容问题）
name: MkDocs Auto Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 设置 Python 环境（3.9 更适配旧版本 MkDocs）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      # 安装兼容版本的依赖（强制指定版本，避免自动升级）
      - name: Install compatible dependencies
        run: |
          python -m pip install --upgrade pip
          # 强制安装 requirements.txt 里的版本，不自动升级
          pip install --force-reinstall -r requirements.txt

      # 构建并部署（用原生 gh-deploy，更稳定）
      - name: Deploy to GitHub Pages
        env:
          # 授权令牌
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 强制部署，忽略版本警告（已锁定兼容版本）
          mkdocs gh-deploy --force --verbose