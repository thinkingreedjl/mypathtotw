# MkDocs 自动部署到 GitHub Pages 的工作流配置
name: MkDocs Auto Deploy

# 正确的触发条件配置（解决 No event triggers defined 报错）
on:
  # 推送到 main 分支时自动触发
  push:
    branches: ["main"]
  # 允许手动触发（在 Actions 页面点 Run workflow）
  workflow_dispatch:

# 工作流执行的任务
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # 安装 MkDocs 依赖（根据你的实际插件补充）
      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material
          # 如果你有其他插件，比如 mkdocs-git-revision-date-plugin，取消下面注释
          # pip install mkdocs-git-revision-date-plugin

      # 构建并部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site