# MkDocs 自动部署（最终稳定版，修复所有已知问题）
name: MkDocs Auto Deploy

# 触发条件：推送到main分支/手动触发
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库代码（包含所有配置文件）
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整提交记录，避免构建异常

      # 2. 设置 Python 环境（3.9 适配 9.x Material 主题更稳定）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"  # 比3.8更适配9.x Material主题
          cache: "pip"  # 重新启用缓存，提升后续运行速度

      # 3. 安装所有依赖（覆盖emoji、minify等插件，无冲突）
      - name: Install all dependencies (emoji + minify)
        run: |
          # 升级pip + 清空缓存，避免旧版本干扰
          python -m pip install --upgrade pip
          pip cache purge
          
          # 核心依赖：锁定兼容版本，避免2.0冲突
          pip install mkdocs==1.5.3 mkdocs-material==9.4.8
          
          # 安装emoji扩展依赖（支持material.extensions.emoji）
          pip install mkdocs-material[emoji]
          
          # 安装minify插件（解决"The 'minify' plugin is not installed"报错）
          pip install mkdocs-minify-plugin
          
          # 可选：预装其他常见插件，避免后续缺失报错
          # pip install mkdocs-git-revision-date-plugin mkdocs-glightbox

      # 4. 预构建验证（提前发现配置错误，便于排查）
      - name: Build MkDocs site (verify config)
        run: mkdocs build --verbose  # 输出详细日志，定位潜在问题

      # 5. 部署到GitHub Pages（强制部署，确保生效）
      - name: Deploy to GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mkdocs gh-deploy --force --verbose