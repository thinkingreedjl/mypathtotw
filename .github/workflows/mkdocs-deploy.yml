# MkDocs 自动部署（无依赖冲突版）
name: MkDocs Auto Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Python 环境（3.8 兼容性最好）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      # 3. 安装依赖（跳过缓存，避免残留旧版本）
      - name: Install dependencies without conflict
        run: |
          # 升级 pip 并清理缓存
          python -m pip install --upgrade pip
          pip cache purge
          # 安装无冲突的版本（直接指定，不用 requirements.txt 避免额外问题）
          pip install mkdocs==1.4.3 mkdocs-material==8.5.11

      # 4. 强制部署（用 MkDocs 原生命令，最稳定）
      - name: Deploy to GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mkdocs gh-deploy --force